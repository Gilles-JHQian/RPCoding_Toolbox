name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Headless pip env for fast CI (no conda / no MFA / no Qt yet).
      # The full reproducible env (incl. Montreal Forced Aligner) is environment.yml.
      - name: Install (pip, headless)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: Pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest
